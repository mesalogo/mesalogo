services:
  backend:
    image: ${BACKEND_IMAGE:-mesalogo/backend}:${IMAGE_TAG:-latest}
    container_name: abm-backend
    profiles:
      - core
    ports:
      - "8080:8080"
    environment:
      - PYTHONIOENCODING=utf-8
      - LC_ALL=C.UTF-8
      - LANG=C.UTF-8
      - PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - UV_INDEX_URL=${UV_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
      - UV_EXTRA_INDEX_URL=${UV_EXTRA_INDEX_URL:-https://pypi.org/simple/}
    volumes:
      - ./volumes/backend-data:/app/data
      - ./volumes/backend-logs:/app/logs
      - ./volumes/backend-workspace:/app/agent-workspace
      - ./volumes/backend-knowledgebase:/app/knowledgebase
      - ./config.conf:/app/config.conf
      - ./mcp_config.json:/app/mcp_config.json
      - ./dir2map/cache:/root/.cache
      - ./dir2map/hanlp:/root/.hanlp
      - ./dir2map/uv:/root/.local/share/uv
      - ./dir2map/npm:/root/.npm
    restart: unless-stopped
    networks:
      - abm-network

  frontend:
    image: ${FRONTEND_IMAGE:-mesalogo/frontend}:${IMAGE_TAG:-latest}
    container_name: abm-frontend
    profiles:
      - core
    ports:
      - "3080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - abm-network

networks:
  abm-network:
    driver: bridge
