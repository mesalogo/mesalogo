[pytest]
# ─── 测试发现 ───
# testpaths 锚定到 tests/,防止 pytest 扫到 app/ 或 scripts/ 下名为 test_*.py 的非测试文件
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 忽略归档、缓存、第三方
norecursedirs = _archive .git .venv .venv-tests __pycache__ node_modules

# ─── anyio backend (asyncio) ───
# 项目用 anyio + pytest-anyio 而非 pytest-asyncio,见 tests/AGENTS.md §6
anyio_mode = auto

# ─── pytest 命令行默认参数 ───
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
    -p no:cacheprovider
    --ignore=tests/_archive
    --ignore-glob=tests/_archive/**

# ─── 自定义 markers (strict-markers 强制注册) ───
# 见 tests/AGENTS.md §2
markers =
    unit: 纯函数,无 IO,毫秒级 (默认)
    integration: 带 DB / Redis / MCP server,秒级
    e2e: 端到端,分钟级,CI 才跑
    contract: OpenAPI / MCP 工具签名不退化
    slow: 单测耗时 > 5 秒
    external: 依赖外部网络 (真实 LLM API / 真实 OAuth 等)
    heartbeat: feature: Agent Heartbeat
    subagent: feature: SubAgent
    supervisor: feature: Supervisor / rule sandbox
    memory: feature: MemoryPalace
    knowledge: feature: 知识库 / LightRAG
    workflow: feature: Workflow Graph 编排

# ─── 警告过滤 ───
filterwarnings =
    error
    ignore::DeprecationWarning:pkg_resources.*
    ignore::DeprecationWarning:google.*
    # 项目历史遗留: nest-asyncio 注入,见 backend-fastapi/AGENTS.md §1
    ignore:.*nest_asyncio.*:UserWarning

# ─── 日志 ───
log_cli = false
log_cli_level = WARNING
log_cli_format = [%(levelname)s] %(name)s: %(message)s
log_format = [%(levelname)s] %(asctime)s - %(name)s - %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
